<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simulatte Mesh</title>
  <style>
    :root {
      --fg: #000;
      --bg: #fff;
      --border-md: 1px;
      --border-sm: 0.5px;
      --opacity-secondary: 0.72;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      overflow: hidden;
      font-size: 14px;
    }

    #field {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: var(--bg);
    }

    #hud {
      position: fixed;
      left: 14px;
      top: 14px;
      right: 14px;
      display: flex;
      justify-content: flex-start;
      pointer-events: none;
      z-index: 2;
    }

    .panel {
      border: var(--border-md) solid var(--fg);
      width: min(100%, 540px);
      max-width: 520px;
      padding: 12px;
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.96);
    }

    .panel h1 {
      margin: 0 0 8px;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .panel p {
      margin: 0;
      line-height: 1.4;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    button,
    a {
      font-family: inherit;
      border: var(--border-sm) dotted var(--fg);
      background: transparent;
      color: inherit;
      padding: 10px 10px;
      cursor: pointer;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      text-align: center;
      opacity: var(--opacity-secondary);
    }

    button {
      appearance: none;
    }

    button:hover,
    a:hover {
      opacity: 1;
      background: var(--fg);
      color: var(--bg);
    }

    button:focus-visible,
    a:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 1px;
    }

    .status {
      margin-top: 10px;
      min-height: 2.4em;
      border-top: var(--border-sm) dotted var(--fg);
      padding-top: 8px;
    }

    .portal {
      position: fixed;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.15) 0%, rgba(0, 0, 0, 0.85) 48%, #000 100%);
      box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.08), 0 0 30px rgba(0, 0, 0, 0.75);
      transform: translate(-50%, -50%) scale(0.05);
      transform-origin: center;
    }

    .portal.active {
      animation: black-hole 950ms cubic-bezier(0.17, 0.88, 0.2, 1) forwards;
    }

    .portal.hidden {
      display: none;
    }

    @keyframes black-hole {
      0% {
        transform: translate(-50%, -50%) scale(0.04);
        opacity: 0.9;
      }
      60% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(120);
        opacity: 1;
      }
    }

    #detail {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.98);
      width: min(580px, calc(100% - 40px));
      background: rgba(255, 255, 255, 0.94);
      border: var(--border-md) solid var(--fg);
      padding: 14px;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms ease, transform 240ms ease;
    }

    #detail.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    #detail[hidden] {
      display: none;
    }

    #detail h2 {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 18px;
    }

    #detail p {
      margin: 0 0 12px;
      max-width: 62ch;
      line-height: 1.45;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #detailReset {
      background: #fff;
    }

    @media (max-width: 720px) {
      #hud {
        right: auto;
      }
    }
  </style>
</head>
<body>
  <canvas id="field" aria-label="Simulatte Mesh Field"></canvas>

  <div id="hud">
    <section class="panel">
      <h1>Simulatte Mesh</h1>
      <p>Guide the marble with a 3-minima energy landscape: Work, Play, Learn.</p>
      <div class="controls">
        <button id="mode-work" data-mode="work" type="button">Work</button>
        <button id="mode-play" data-mode="play" type="button">Play</button>
        <button id="mode-learn" data-mode="learn" type="button">Learn</button>
        <button id="jitter" type="button">Jitter</button>
      </div>
      <p class="status" id="status">Select a mode to create directional minima.</p>
    </section>
  </div>

  <div id="portal" class="portal hidden" aria-hidden="true"></div>

  <section id="detail" hidden aria-live="polite">
    <h2 id="detailTitle"></h2>
    <p id="detailCopy"></p>
    <div class="detail-actions">
      <a id="detailLink" class="link" href="#" target="_blank" rel="noopener noreferrer">Open destination</a>
      <button id="detailReset" type="button">Reset energy</button>
    </div>
  </section>

  <script>
    (() => {
      const canvas = document.getElementById('field');
      const ctx = canvas.getContext('2d');

      const statusEl = document.getElementById('status');
      const detailEl = document.getElementById('detail');
      const detailTitleEl = document.getElementById('detailTitle');
      const detailCopyEl = document.getElementById('detailCopy');
      const detailLinkEl = document.getElementById('detailLink');
      const portalEl = document.getElementById('portal');
      const modeButtons = Array.from(document.querySelectorAll('[data-mode]'));
      const jitterBtn = document.getElementById('jitter');
      const resetBtn = document.getElementById('detailReset');

      const anchors = {
        research: {
          id: 'research',
          label: 'Research',
          url: 'https://256.one',
          copy:
            'Research maps to systems design, language experiments, and core model exploration.',
          point: { x: -0.83, z: -0.22 },
          color: '#111',
        },
        agents: {
          id: 'agents',
          label: 'Agents',
          url: 'https://replo.id',
          copy:
            'Agents points to RSI tools, execution loops, and agent tooling where actions are modelable.',
          point: { x: 0.78, z: 0.62 },
          color: '#222',
        },
        infra: {
          id: 'infra',
          label: 'Infra',
          url: 'https://d4da.com',
          copy:
            'Infra tracks the platform layer: libraries, infrastructure, and reusable primitives.',
          point: { x: 0.03, z: 0.95 },
          color: '#333',
        },
      };

      const modes = {
        work: { research: 1, infra: 1 },
        play: { agents: 1, infra: 1 },
        learn: { agents: 1, research: 1 },
      };

      const mesh = {
        xRange: 2.6,
        zRange: 1.9,
        spread: 0.62,
        settleDist: 0.095,
      };

      const state = {
        x: 0,
        z: 0,
        vx: 0,
        vz: 0,
        mode: 'neutral',
        modeWeights: {},
        jitterTimer: 0,
        jitterDir: { x: 0, z: 0 },
        t: 0,
        lastT: 0,
        phase: 'field',
        arrival: null,
        portalX: 0,
        portalY: 0,
      };

      let dpr = window.devicePixelRatio || 1;

      function width() {
        return canvas.width / dpr;
      }

      function height() {
        return canvas.height / dpr;
      }

      function resize() {
        dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(innerWidth * dpr);
        canvas.height = Math.round(innerHeight * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function setMode(nextMode) {
        if (state.phase === 'portal') {
          return;
        }

        if (state.mode === nextMode) {
          state.mode = 'neutral';
          state.modeWeights = {};
          state.arrival = null;
          statusEl.textContent = 'Mode cleared. Select Work, Play, or Learn.';
        } else {
          state.mode = nextMode;
          state.modeWeights = { ...modes[nextMode] };
          state.arrival = null;
          statusEl.textContent = `${nextMode.toUpperCase()} active. The field will move toward the paired minima.`;
        }

        modeButtons.forEach((button) => {
          if (button.dataset.mode === state.mode) {
            button.style.opacity = '1';
            button.style.background = '#000';
            button.style.color = '#fff';
          } else {
            button.style.opacity = '';
            button.style.background = 'transparent';
            button.style.color = '';
          }
        });
      }

      function reset() {
        state.x = 0;
        state.z = 0;
        state.vx = 0;
        state.vz = 0;
        state.mode = 'neutral';
        state.modeWeights = {};
        state.jitterTimer = 0;
        state.arrival = null;
        state.phase = 'field';
        state.portalX = 0;
        state.portalY = 0;
        state.lastT = performance.now();

        portalEl.classList.remove('active');
        portalEl.classList.add('hidden');
        detailEl.hidden = true;
        detailEl.classList.remove('visible');
        detailTitleEl.textContent = '';
        detailCopyEl.textContent = '';
        detailLinkEl.href = '#';

        modeButtons.forEach((button) => {
          button.style.opacity = '';
          button.style.background = 'transparent';
          button.style.color = '';
        });

        statusEl.textContent = 'Select a mode to create directional minima.';
      }

      function jitter() {
        const angle = Math.random() * Math.PI * 2;
        const mag = 0.45 + Math.random() * 0.3;
        state.vx += Math.cos(angle) * mag;
        state.vz += Math.sin(angle) * mag;
        state.jitterTimer = 0.92;
        state.jitterDir = { x: Math.cos(angle), z: Math.sin(angle) };

        if (state.mode === 'neutral') {
          statusEl.textContent = 'Jitter fired. The marble receives a random perturbation.';
        } else {
          statusEl.textContent = `Jitter fired during ${state.mode.toUpperCase()}.`;
        }
      }

      function gaussian(cx, cz, x, z) {
        const dx = x - cx;
        const dz = z - cz;
        const spread2 = mesh.spread * mesh.spread;
        return Math.exp(-(dx * dx + dz * dz) / (2 * spread2));
      }

      function fieldPotential(x, z) {
        const bowl = 0.24 * (x * x + z * z);
        const wave = 0.15 * Math.sin(x * 1.45 + state.t * 0.16) * Math.cos(z * 1.22 - state.t * 0.09);
        const swirl = 0.08 * Math.sin((x + z) * 1.1 + state.t * 0.21);
        const ridge = 0.04 * Math.cos((x - z) * 1.6 + Math.cos(state.t * 0.11));
        let e = bowl + wave + swirl + ridge;

        for (const [key, value] of Object.entries(anchors)) {
          const w = state.modeWeights[key] || 0;
          if (!w) {
            continue;
          }
          e -= w * 1.0 * gaussian(value.point.x, value.point.z, x, z);
        }

        return e;
      }

      function fieldGradient(x, z) {
        const eps = 0.0035;
        const right = fieldPotential(x + eps, z);
        const left = fieldPotential(x - eps, z);
        const up = fieldPotential(x, z + eps);
        const down = fieldPotential(x, z - eps);

        const dEx = (right - left) / (2 * eps);
        const dEz = (up - down) / (2 * eps);
        let fx = -dEx;
        let fz = -dEz;

        if (state.jitterTimer > 0) {
          const fade = state.jitterTimer;
          fx += state.jitterDir.x * fade * 0.65;
          fz += state.jitterDir.z * fade * 0.65;
          state.jitterTimer = Math.max(0, state.jitterTimer - 0.018);
        }

        return { fx, fz };
      }

      function fieldHeight(x, z) {
        const noise = 0.06 * Math.sin(1.8 * x - 0.9 * state.t) * Math.cos(2.4 * z + 1.1 * state.t * 0.5);
        const basin = 0.02 * Math.cos(4.2 * x + 1.2 * z);
        const wells =
          -0.65 * gaussian(anchors.research.point.x, anchors.research.point.z, x, z) +
          -0.55 * gaussian(anchors.agents.point.x, anchors.agents.point.z, x, z) +
          -0.55 * gaussian(anchors.infra.point.x, anchors.infra.point.z, x, z);

        return 0.36 * (x * x + z * z) + noise + basin + wells;
      }

      function toScreen(x, z, h) {
        const cx = x * Math.cos(0.62) - z * Math.sin(0.62);
        const cy = x * Math.sin(0.62) + z * Math.cos(0.62);
        const perspective = 1 / (1 + 0.24 * cy + 0.05);
        const sx = width() * 0.5 + cx * 210 * perspective;
        const sy = height() * 0.56 - h * 210 + (-cy * 82) * perspective;
        return { x: sx, y: sy, scale: perspective };
      }

      function maybeArrive() {
        if (state.mode === 'neutral' || state.phase !== 'field') {
          return;
        }

        let selected = null;
        let closest = Infinity;
        for (const [key, anchor] of Object.entries(anchors)) {
          if (!state.modeWeights[key]) {
            continue;
          }
          const dist = Math.hypot(state.x - anchor.point.x, state.z - anchor.point.z);
          if (dist < closest) {
            closest = dist;
            selected = key;
          }
        }

        if (!selected) {
          return;
        }

        const speed = Math.hypot(state.vx, state.vz);
        if (closest < mesh.settleDist && speed < 0.018) {
          engageArrival(selected);
        }
      }

      function engageArrival(key) {
        state.phase = 'portal';
        state.arrival = key;

        const anchor = anchors[key];
        const h = fieldHeight(state.x, state.z);
        const screen = toScreen(state.x, state.z, h);
        state.portalX = screen.x;
        state.portalY = screen.y;

        portalEl.style.left = `${screen.x}px`;
        portalEl.style.top = `${screen.y}px`;
        portalEl.classList.remove('hidden');
        portalEl.classList.remove('active');
        requestAnimationFrame(() => {
          portalEl.classList.add('active');
        });

        statusEl.textContent = `Arrival locked. Showing ${anchor.label}.`;

        setTimeout(() => {
          detailTitleEl.textContent = anchor.label;
          detailCopyEl.textContent = anchor.copy;
          detailLinkEl.href = anchor.url;
          detailEl.hidden = false;
          requestAnimationFrame(() => {
            detailEl.classList.add('visible');
          });
        }, 900);
      }

      function drawMeshGrid() {
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';

        const zMin = -mesh.zRange;
        const zMax = mesh.zRange;
        const xMin = -mesh.xRange;
        const xMax = mesh.xRange;
        const step = 0.16;

        for (let z = zMin; z <= zMax; z += step) {
          ctx.beginPath();
          let started = false;
          for (let x = xMin; x <= xMax; x += step) {
            const h = fieldHeight(x, z);
            const p = toScreen(x, z, h);
            if (p.x < -30 || p.x > width() + 30 || p.y < -60 || p.y > height() + 60) {
              continue;
            }
            if (!started) {
              ctx.moveTo(p.x, p.y);
              started = true;
            } else {
              ctx.lineTo(p.x, p.y);
            }
          }
          ctx.stroke();
        }

        for (let x = xMin; x <= xMax; x += step) {
          ctx.beginPath();
          let started = false;
          for (let z = zMin; z <= zMax; z += step) {
            const h = fieldHeight(x, z);
            const p = toScreen(x, z, h);
            if (p.x < -30 || p.x > width() + 30 || p.y < -60 || p.y > height() + 60) {
              continue;
            }
            if (!started) {
              ctx.moveTo(p.x, p.y);
              started = true;
            } else {
              ctx.lineTo(p.x, p.y);
            }
          }
          ctx.stroke();
        }
      }

      function drawAnchors() {
        for (const anchor of Object.values(anchors)) {
          const h = fieldHeight(anchor.point.x, anchor.point.z);
          const p = toScreen(anchor.point.x, anchor.point.z, h);

          const radius = 5 + 2 * p.scale;
          ctx.beginPath();
          ctx.strokeStyle = anchor.color;
          ctx.fillStyle = anchor.color;
          ctx.lineWidth = 1.2;
          ctx.arc(p.x, p.y, radius * 1.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = anchor.color;
          ctx.font = '11px "SF Mono", "Menlo", "Consolas", monospace';
          ctx.fillText(anchor.label, p.x + 10, p.y + 2);
        }
      }

      function drawMarble() {
        const h = fieldHeight(state.x, state.z);
        const p = toScreen(state.x, state.z, h);
        const opacity = state.phase === 'portal' ? 0.15 : 1;
        const r = Math.max(7, 20 * p.scale);

        const radial = ctx.createRadialGradient(
          p.x - 3,
          p.y - 4,
          Math.max(1, r * 0.2),
          p.x,
          p.y,
          r
        );
        radial.addColorStop(0, `rgba(240, 240, 240, ${opacity})`);
        radial.addColorStop(0.45, `rgba(30, 30, 30, ${opacity})`);
        radial.addColorStop(1, `rgba(0, 0, 0, ${opacity})`);

        ctx.beginPath();
        ctx.fillStyle = radial;
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = `rgba(0,0,0,${opacity})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        if (state.phase !== 'portal') {
          ctx.fillStyle = 'rgba(0,0,0,0.72)';
          ctx.font = '11px "SF Mono", "Menlo", "Consolas", monospace';
          const v = Math.hypot(state.vx, state.vz).toFixed(2);
          ctx.fillText(`v ${v}`, p.x + 12, p.y - 12);
        }
      }

      function stepPhysics(dt) {
        const force = fieldGradient(state.x, state.z);
        state.vx += force.fx * dt;
        state.vz += force.fz * dt;
        state.vx *= 1 - dt * 1.5;
        state.vz *= 1 - dt * 1.5;

        const speed = Math.hypot(state.vx, state.vz);
        const maxSpeed = 2.0;
        if (speed > maxSpeed) {
          const scale = maxSpeed / speed;
          state.vx *= scale;
          state.vz *= scale;
        }

        state.x += state.vx * dt * 1.8;
        state.z += state.vz * dt * 1.8;

        const bounds = 2.3;
        if (state.x > bounds) {
          state.x = bounds;
          state.vx *= -0.55;
        }
        if (state.x < -bounds) {
          state.x = -bounds;
          state.vx *= -0.55;
        }
        if (state.z > bounds) {
          state.z = bounds;
          state.vz *= -0.55;
        }
        if (state.z < -bounds) {
          state.z = -bounds;
          state.vz *= -0.55;
        }
      }

      function render() {
        const w = width();
        const h = height();

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, w, h);

        drawMeshGrid();
        drawAnchors();
        drawMarble();

        if (state.phase === 'portal') {
          const p = toScreen(state.x, state.z, fieldHeight(state.x, state.z));
          state.portalX = p.x;
          state.portalY = p.y;
          portalEl.style.left = `${state.portalX}px`;
          portalEl.style.top = `${state.portalY}px`;
        }
      }

      function tick(now) {
        const dt = Math.min(0.05, (now - state.lastT) / 1000 || 0.016);
        state.lastT = now;
        state.t = now * 0.001;

        if (state.phase === 'field') {
          stepPhysics(dt);
          maybeArrive();
        }

        render();
        requestAnimationFrame(tick);
      }

      modeButtons.forEach((button) => {
        button.addEventListener('click', () => {
          setMode(button.dataset.mode);
        });
      });

      jitterBtn.addEventListener('click', jitter);
      resetBtn.addEventListener('click', reset);

      window.addEventListener('resize', resize);

      resize();
      reset();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
