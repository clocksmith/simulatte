<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simulatte</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <style>
    :root {
      --bg: #ffffff;
      --panel: rgba(255, 255, 255, 0.74);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --border: rgba(26, 49, 47, 0.12);
      --border-strong: rgba(26, 49, 47, 0.24);
      --text: #17201d;
      --dim: rgba(23, 32, 29, 0.66);
      --muted: rgba(23, 32, 29, 0.46);
      --accent: #7ac943;
      --accent-ink: #10210b;
      --teal: #2bb8a6;
      --gold: #d9a431;
      --risk: #e7725f;
      --ok: #58b368;
      --shadow: 0 24px 80px rgba(45, 67, 60, 0.14);
      color-scheme: light;
      accent-color: var(--accent);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: rgba(122, 201, 67, 0.16);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.46 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background:
        linear-gradient(90deg, rgba(39, 93, 79, 0.035) 1px, transparent 1px),
        linear-gradient(rgba(39, 93, 79, 0.03) 1px, transparent 1px),
        #ffffff;
      background-size: 32px 32px, 32px 32px, auto;
    }

    ::selection {
      background: rgba(122, 201, 67, 0.22);
      color: var(--text);
    }

    #field,
    #particle-field,
    #field-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #field {
      z-index: 1;
      cursor: default;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #particle-field {
      z-index: 2;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.88;
    }

    #field-overlay {
      z-index: 3;
      pointer-events: none;
    }

    .panel {
      color: var(--text);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), var(--panel));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    #hud {
      position: fixed;
      top: 14px;
      left: 14px;
      width: min(432px, calc(100vw - 28px));
      max-height: calc(100vh - 28px);
      overflow: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
      scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
    }

    #hud.panel {
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .control-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    .brand {
      margin: 0;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .promise {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .runtime-badge {
      margin-top: 7px;
      color: var(--teal);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status {
      max-width: 190px;
      min-height: 1.25em;
      color: var(--dim);
      font-size: 11px;
      line-height: 1.25;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status[data-kind="ok"] {
      color: var(--ok);
    }

    label,
    .label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .scenario-form {
      display: grid;
      gap: 8px;
    }

    .prompt-shell {
      position: relative;
    }

    textarea,
    input,
    select,
    button,
    a {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-strong);
      color: var(--text);
      font: inherit;
    }

    textarea,
    input,
    select {
      width: 100%;
      min-width: 0;
      outline: none;
    }

    textarea {
      min-height: 88px;
      max-height: 210px;
      resize: vertical;
      padding: 10px;
    }

    input,
    select {
      height: 32px;
      padding: 0 9px;
    }

    input[type="range"] {
      height: 26px;
      padding: 0;
      background: transparent;
      border: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(26, 49, 47, 0.12);
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 18px;
      height: 18px;
      margin-top: -6px;
      border: 2px solid rgba(255, 255, 255, 0.95);
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 6px 18px rgba(122, 201, 67, 0.25);
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-moz-range-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(26, 49, 47, 0.12);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.95);
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 6px 18px rgba(122, 201, 67, 0.25);
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122, 201, 67, 0.16);
    }

    button,
    a {
      min-height: 32px;
      padding: 0 11px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      font-weight: 650;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    button:hover:not(:disabled),
    a:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
      box-shadow: 0 10px 24px rgba(122, 201, 67, 0.18);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .primary-action {
      background: rgba(122, 201, 67, 0.16);
      border-color: rgba(122, 201, 67, 0.4);
      color: #356b20;
    }

    .primary-action:hover:not(:disabled) {
      background: var(--accent);
      color: var(--accent-ink);
    }

    .scenario-examples,
    .action-row,
    .utility-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      width: 100%;
    }

    .scenario-example {
      min-height: 28px;
      padding: 0 9px;
      color: var(--dim);
      font-size: 11px;
    }

    .action-row button {
      min-width: 0;
      width: 100%;
    }

    .board-objects {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 1px 0 3px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
    }

    .object-chip {
      flex: 0 0 auto;
      min-width: 112px;
      max-width: 168px;
      min-height: 42px;
      padding: 6px 8px;
      text-align: left;
      border-color: rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.045);
      transition: background 0.24s, border-color 0.24s, color 0.24s, opacity 0.24s;
    }

    .object-chip[data-kind="actor"] {
      border-color: rgba(122, 201, 67, 0.32);
    }

    .object-chip[data-kind="resource"] {
      border-color: rgba(43, 184, 166, 0.34);
    }

    .object-chip[data-kind="shock"] {
      border-color: rgba(231, 114, 95, 0.38);
    }

    .object-chip[data-kind="goal"] {
      border-color: rgba(217, 164, 49, 0.36);
    }

    .object-chip.is-active {
      background: rgba(122, 201, 67, 0.16);
      border-color: var(--accent);
      color: var(--text);
    }

    .object-chip strong,
    .object-chip span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .object-chip strong {
      color: var(--text);
      font-size: 10px;
      line-height: 1.18;
    }

    .object-chip span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .metric {
      min-height: 38px;
      padding: 5px 0;
      border-top: 1px solid var(--border);
      background: transparent;
    }

    .metric strong,
    .metric span {
      display: block;
    }

    .metric strong {
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
    }

    .metric span {
      color: var(--accent);
      font-size: 16px;
      line-height: 1.18;
      transition: color 0.22s;
    }

    .worldspec-panel {
      border-top: 1px solid var(--border);
      padding-top: 8px;
      display: grid;
      gap: 7px;
    }

    .worldspec-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }

    .worldspec-title,
    .worldspec-summary {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .worldspec-title {
      color: var(--dim);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .worldspec-summary {
      color: var(--text);
      font-size: 11px;
      line-height: 1.35;
    }

    .model-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      min-height: 24px;
      padding: 3px 7px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--dim);
      font-size: 10px;
      text-transform: uppercase;
      transition: background 0.24s, border-color 0.24s, color 0.24s;
    }

    .chip strong {
      color: var(--accent);
      font-weight: 700;
    }

    .spec-preview {
      max-height: 128px;
      margin: 0;
      overflow: auto;
      padding: 8px;
      border: 1px solid rgba(26, 49, 47, 0.1);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.52);
      color: rgba(23, 32, 29, 0.68);
      font: 10px/1.42 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }

    details {
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    summary {
      cursor: pointer;
      color: var(--dim);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .setup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .setup-grid .wide {
      grid-column: 1 / -1;
    }

    .setup-grid textarea {
      min-height: 54px;
      font-size: 11px;
    }

    .utility-row {
      margin-top: 8px;
    }

    .utility-row button {
      flex: 1 1 78px;
      min-height: 30px;
      padding: 0 8px;
      font-size: 11px;
    }

    .trace-inline {
      border-top: 1px solid var(--border);
      padding-top: 8px;
      display: grid;
      gap: 5px;
    }

    .trace-inline-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .trace-title,
    .room-state,
    .replay-summary {
      margin: 0;
      font-size: 11px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .replay-summary {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.24s;
    }

    .trace-title {
      color: var(--dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .room-state {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .replay-list {
      display: grid;
      gap: 4px;
      max-height: 88px;
      overflow: auto;
      padding-right: 2px;
    }

    .replay-item {
      border-left: 1px solid rgba(122, 201, 67, 0.42);
      padding-left: 7px;
      cursor: pointer;
    }

    .replay-item:hover,
    .replay-item:focus-visible {
      border-left-color: var(--accent);
      outline: none;
    }

    .replay-item strong,
    .replay-item span {
      display: block;
    }

    .replay-item strong {
      color: var(--text);
      font-size: 11px;
      text-transform: uppercase;
    }

    .replay-item span {
      color: var(--dim);
      font-size: 11px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copyright {
      position: fixed;
      left: 14px;
      bottom: 10px;
      z-index: 3;
      color: rgba(243, 243, 236, 0.42);
      font-size: 10px;
      letter-spacing: 0.08em;
      pointer-events: none;
      text-transform: uppercase;
    }

    .room-tools {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .room-tools button {
      min-width: 0;
    }

    @media (max-width: 760px) {
      #hud {
        top: 10px;
        left: 10px;
        width: calc(100vw - 20px);
        max-height: 59vh;
      }

      .replay-list {
        max-height: 72px;
      }

      .setup-grid,
      .metric-grid {
        grid-template-columns: 1fr 1fr;
      }

      .room-tools {
        grid-template-columns: 1fr;
      }

      .action-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .action-row button {
        padding: 0 6px;
      }

      .status {
        max-width: 128px;
      }
    }

    .physics-stage {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(39, 93, 79, 0.035) 1px, transparent 1px),
        linear-gradient(rgba(39, 93, 79, 0.03) 1px, transparent 1px),
        #ffffff;
      background-size: 32px 32px, 32px 32px, auto;
    }

    .physics-panel {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: auto;
      padding: 16px;
      border-right: 1px solid rgba(26, 49, 47, 0.1);
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 18px 0 70px rgba(43, 66, 57, 0.11);
      backdrop-filter: blur(22px) saturate(1.08);
      -webkit-backdrop-filter: blur(22px) saturate(1.08);
      animation: surface-in 0.42s ease both;
    }

    @keyframes surface-in {
      from {
        opacity: 0;
        transform: translateX(-8px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .physics-brand h1 {
      margin: 0;
    }

    .physics-brand h1 {
      font-size: 17px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .physics-status {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .example-row {
      display: grid;
      grid-template-columns: repeat(6, 34px);
      gap: 7px;
    }

    .component-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .example-chip,
    .component-chip {
      min-height: 32px;
      padding: 0 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(26, 49, 47, 0.12);
      color: var(--text);
      font-size: 12px;
      font-weight: 680;
      box-shadow: 0 8px 24px rgba(45, 67, 60, 0.055);
    }

    .example-chip {
      width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      font-size: 12px;
      letter-spacing: 0;
    }

    .example-chip.is-active {
      background: rgba(122, 201, 67, 0.18);
      border-color: rgba(122, 201, 67, 0.42);
    }

    .component-stack {
      min-height: 40px;
      align-items: center;
    }

    .component-chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      color: rgba(23, 32, 29, 0.68);
      font-size: 11px;
      box-shadow: none;
    }

    .component-chip.is-domain {
      color: rgba(28, 109, 94, 0.86);
      background: rgba(43, 184, 166, 0.1);
      border-color: rgba(43, 184, 166, 0.18);
    }

    .component-chip.is-source {
      background: rgba(122, 201, 67, 0.12);
      border-color: rgba(122, 201, 67, 0.2);
    }

    .component-chip.is-controller,
    .component-chip.is-sensor,
    .component-chip.is-process {
      background: rgba(108, 143, 236, 0.11);
      border-color: rgba(108, 143, 236, 0.2);
      color: rgba(45, 71, 145, 0.72);
    }

    .component-chip.is-field,
    .component-chip.is-material {
      background: rgba(174, 122, 238, 0.1);
      border-color: rgba(174, 122, 238, 0.18);
      color: rgba(91, 58, 139, 0.7);
    }

    .component-chip.is-actor {
      background: rgba(246, 176, 82, 0.13);
      border-color: rgba(246, 176, 82, 0.22);
      color: rgba(118, 77, 20, 0.72);
    }

    .component-chip.is-sink,
    .component-chip.is-loss {
      background: rgba(231, 114, 95, 0.1);
      border-color: rgba(231, 114, 95, 0.18);
    }

    .component-chip.is-empty {
      border-style: dashed;
      color: rgba(23, 32, 29, 0.46);
    }

    .template-chip {
      min-height: 68px;
      padding: 8px;
      text-align: left;
      background: rgba(255, 255, 255, 0.7);
      border-color: rgba(26, 49, 47, 0.12);
      box-shadow: 0 10px 26px rgba(45, 67, 60, 0.06);
    }

    .template-chip strong,
    .template-chip span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .template-chip strong {
      color: var(--text);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 720;
    }

    .template-chip span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .template-chip.is-active {
      background: rgba(122, 201, 67, 0.14);
      border-color: rgba(122, 201, 67, 0.46);
    }

    .template-chip[data-template-id="magnetic-wheel"] {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(122, 201, 67, 0.08));
    }

    .template-chip[data-template-id="fluid-vortex"] {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(43, 184, 166, 0.11));
      border-color: rgba(43, 184, 166, 0.18);
    }

    .template-chip[data-template-id="reaction-diffusion"] {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(217, 164, 49, 0.1));
      border-color: rgba(217, 164, 49, 0.18);
    }

    .template-chip[data-template-id="blank-world"] {
      background:
        linear-gradient(90deg, rgba(43, 137, 118, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(43, 137, 118, 0.05) 1px, transparent 1px),
        rgba(255, 255, 255, 0.78);
      background-size: 14px 14px, 14px 14px, auto;
      border-style: dashed;
      border-color: rgba(43, 137, 118, 0.28);
    }

    .template-chip[data-template-id="fluid-vortex"].is-active {
      background: linear-gradient(135deg, rgba(43, 184, 166, 0.16), rgba(255, 255, 255, 0.78));
      border-color: rgba(43, 184, 166, 0.46);
    }

    .template-chip[data-template-id="reaction-diffusion"].is-active {
      background: linear-gradient(135deg, rgba(217, 164, 49, 0.16), rgba(255, 255, 255, 0.78));
      border-color: rgba(217, 164, 49, 0.42);
    }

    .template-chip[data-template-id="blank-world"].is-active {
      background:
        linear-gradient(90deg, rgba(43, 137, 118, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(43, 137, 118, 0.07) 1px, transparent 1px),
        rgba(255, 255, 255, 0.86);
      background-size: 12px 12px, 12px 12px, auto;
      border-color: rgba(43, 137, 118, 0.46);
    }

    .physics-name {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      letter-spacing: 0;
      text-transform: none;
    }

    .builder-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: end;
    }

    .builder-row textarea {
      min-height: 136px;
      resize: vertical;
      border-radius: 16px;
      font-size: 16px;
      line-height: 1.36;
    }

    .builder-row button {
      min-width: 74px;
      height: 42px;
      border-radius: 999px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .control-stack,
    .readout-grid {
      display: grid;
      gap: 8px;
    }

    .physics-control {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .physics-control input {
      width: 100%;
      accent-color: var(--accent);
    }

    .readout-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .readout {
      min-height: 54px;
      padding: 8px 0;
      border-top: 1px solid var(--border);
    }

    .readout strong,
    .readout span {
      display: block;
    }

    .readout strong {
      color: var(--muted);
      font-size: 10px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .readout span {
      color: var(--accent);
      font-size: 20px;
      font-weight: 720;
      line-height: 1.2;
    }

    .physics-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .physics-actions button {
      min-width: 0;
      width: 100%;
    }

    .physics-footer {
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid rgba(26, 49, 47, 0.08);
      color: rgba(23, 32, 29, 0.42);
      font-size: 11px;
      line-height: 1.3;
    }

    .physics-footer a {
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font-size: inherit;
      font-weight: 650;
      text-decoration: none;
    }

    .physics-footer a:hover {
      background: transparent;
      box-shadow: none;
      color: rgba(28, 109, 94, 0.88);
      transform: none;
    }

    .physics-canvas-wrap {
      position: relative;
      min-width: 0;
      min-height: 100vh;
    }

    #physics-canvas {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      display: block;
    }

    #field-canvas {
      position: absolute;
      z-index: 2;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      display: block;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.88;
    }

    .physics-note {
      margin: 0;
      color: rgba(243, 243, 236, 0.56);
      font-size: 11px;
      line-height: 1.45;
    }

    .physics-spec-preview {
      max-height: 172px;
    }

    .intent-details {
      border-top: 1px solid var(--border);
      padding-top: 9px;
    }

    .intent-details > * + * {
      margin-top: 11px;
    }

    .intent-details summary {
      color: rgba(23, 32, 29, 0.54);
      font-size: 12px;
      font-weight: 680;
      letter-spacing: 0;
      text-transform: none;
    }

    @media (max-width: 820px) {
      html,
      body {
        overflow: auto;
      }

      .physics-stage {
        position: static;
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(420px, 1fr);
        min-height: 100vh;
      }

      .physics-panel {
        border-right: 0;
        border-bottom: 1px solid rgba(26, 49, 47, 0.1);
        max-height: none;
        overflow: auto;
        padding: 18px;
      }

      .physics-canvas-wrap,
      #physics-canvas {
        min-height: 420px;
      }

      .builder-row {
        grid-template-columns: 1fr;
      }

      .physics-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .component-chip:nth-child(n+10) {
        display: none;
      }

      .template-chip {
        min-height: 58px;
        padding: 7px;
      }

      .builder-row button {
        height: 34px;
      }
    }
  </style>
</head>
<body>
  <main class="physics-stage" aria-label="Simulatte physics lab">
    <section class="physics-panel" aria-label="Simulation creator controls">
      <div class="physics-brand">
        <h1>Simulatte</h1>
        <span id="lab-state" class="physics-status" aria-live="polite">loading creator</span>
      </div>

      <div class="example-row" aria-label="Example prompts">
        <button class="example-chip" type="button" aria-label="Seed W" data-example-prompt="sunlit rotor with alternating magnets, moving slider, solar input, load torque, bearing drag, and conservation meter" data-example-params='{"irradiance":1040,"magneticStrength":0.9,"sliderAmplitude":0.68,"sliderPhase":0.12,"loadTorque":0.28,"friction":0.055,"driveTiming":0.64}'>W</button>
        <button class="example-chip" type="button" aria-label="Seed X" data-example-prompt="dry pine litter combustion with a wind band, smoke lift, water line, rock break, damp pockets, and thermal spread" data-example-params='{"combustibility":0.88,"moisture":0.18,"windSpeed":0.52,"flowRate":0.38,"heatTransfer":0.74,"opacity":0.62,"damping":0.07}'>X</button>
        <button class="example-chip" type="button" aria-label="Seed Y" data-example-prompt="collimated white beam through glass lens, prism, mirror rail, sensor plane, refractive split, and prismatic rays" data-example-params='{"lightIntensity":0.92,"refractiveIndex":1.68,"opacity":0.08,"fieldStrength":0.62,"heatTransfer":0.14,"signalNoise":0.04}'>Y</button>
        <button class="example-chip" type="button" aria-label="Seed Z" data-example-prompt="rush-hour service loop with signal delay, power feeder, demand queue, load zone, noisy packets, and throughput meter" data-example-params='{"queueBacklog":0.78,"serviceRate":0.42,"marketDemand":0.74,"networkLatency":0.44,"signalDelay":0.32,"signalNoise":0.18}'>Z</button>
        <button class="example-chip" type="button" aria-label="Seed P" data-example-prompt="steep rain channel cutting sand and soil around rock ridges with water flow, erosion, sediment fan, and gravity slope" data-example-params='{"flowRate":0.82,"erosionRate":0.62,"terrainSlope":0.54,"gravity":0.18,"granularFriction":0.32,"moisture":0.76}'>P</button>
        <button class="example-chip" type="button" aria-label="Seed Q" data-example-prompt="water air rock wood metal glass magnetized metal gravity heat diffusion sample tray" data-example-params='{"density":0.74,"hardness":0.76,"conductivity":0.72,"magnetization":0.68,"refractiveIndex":1.58,"moisture":0.66,"heatTransfer":0.45}'>Q</button>
      </div>

      <div class="builder-row">
        <label class="physics-name" for="build-prompt">
          <span class="sr-only">Prompt</span>
          <textarea id="build-prompt" data-example-params='{"irradiance":1040,"magneticStrength":0.9,"sliderAmplitude":0.68,"sliderPhase":0.12,"loadTorque":0.28,"friction":0.055,"driveTiming":0.64}'>sunlit rotor with alternating magnets, moving slider, solar input, load torque, bearing drag, and conservation meter</textarea>
        </label>
        <button id="build-lab" class="primary-action" type="button">Run</button>
      </div>

      <input id="simulation-name" type="hidden" value="">

      <details class="intent-details">
        <summary>more</summary>
        <div id="component-stack" class="component-stack" aria-label="Resolved components"></div>
        <div class="readout-grid" aria-label="Physics readouts">
          <div class="readout"><strong id="readout-1-label">RPM</strong><span id="readout-1">0</span></div>
          <div class="readout"><strong id="readout-2-label">Torque</strong><span id="readout-2">0</span></div>
          <div class="readout"><strong id="readout-3-label">Solar</strong><span id="readout-3">0</span></div>
          <div class="readout"><strong id="readout-4-label">Load</strong><span id="readout-4">0</span></div>
          <div class="readout"><strong id="readout-5-label">Actuator</strong><span id="readout-5">0</span></div>
          <div class="readout"><strong id="readout-6-label">Balance</strong><span id="readout-6">0</span></div>
        </div>
        <div class="physics-actions">
          <button id="pause-lab" class="primary-action" type="button">Pause</button>
          <button id="remix-lab" type="button">Remix</button>
          <button id="export-lab" type="button">Export</button>
          <button id="import-lab" type="button">Import</button>
        </div>
        <div id="control-stack" class="control-stack" aria-label="Intent component parameters"></div>
        <pre id="spec-preview" class="spec-preview physics-spec-preview" aria-label="Current simulation spec">loading spec</pre>
      </details>

      <footer class="physics-footer">
        <a href="https://d4da.com/" rel="noopener">d4da.com</a>
      </footer>
    </section>

    <section class="physics-canvas-wrap" aria-label="Live simulation canvas">
      <canvas id="field-canvas" aria-hidden="true"></canvas>
      <canvas id="physics-canvas" aria-label="Simulatte physics canvas"></canvas>
    </section>
  </main>

  <script defer src="./js/simulatte-particle-field.js"></script>
  <script defer src="./js/simulatte-physics-catalog.js"></script>
  <script defer src="./js/simulatte-intent-classifier.js"></script>
  <script defer src="./js/simulatte-composition-graph.js"></script>
  <script defer src="./js/simulatte-world-plan.js"></script>
  <script defer src="./js/simulatte-physics-model.js"></script>
  <script defer src="./js/simulatte-physics-renderer.js"></script>
  <script defer src="./js/simulatte-physics-lab.js"></script>
</body>
</html>
