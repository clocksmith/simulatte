  <path d="M679 551H687M679 546v10M687 546v10" class="doppler-mark" />
  <circle cx="683" cy="551" r="5" fill="#6d28d9" />
  <path d="M650 577H950" class="axis" />
  <path d="M896 577H921M896 572v10M921 572v10" class="tjs-mark" />
  <circle cx="908" cy="577" r="5" fill="#ffb000" />
  <line x1="990" y1="542" x2="990" y2="586" class="column-line" />
  <text x="1109" y="573" text-anchor="middle" class="ratio">1.62x</text>
