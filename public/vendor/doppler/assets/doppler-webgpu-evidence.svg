  <circle cx="686" cy="679" r="5" fill="#6d28d9" />
  <path d="M650 705H950" class="axis" />
  <path d="M892 705H921M892 700v10M921 700v10" class="tjs-mark" />
  <circle cx="906" cy="705" r="5" fill="#ffb000" />
  <line x1="990" y1="670" x2="990" y2="714" class="column-line" />
  <text x="1109" y="701" text-anchor="middle" class="ratio">1.69x</text>
  <line x1="42" y1="726" x2="1238" y2="726" class="row-line" />

