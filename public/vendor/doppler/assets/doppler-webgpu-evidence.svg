<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="930" viewBox="0 0 1280 930" role="img" aria-labelledby="title desc">
  <title id="title">Metal and Vulkan browser WebGPU latency</title>
  <desc id="desc">Mean latency and sample standard deviation for nine Doppler and Transformers.js comparisons on Apple M3 Metal and Radeon 8060S Vulkan.</desc>
  <defs>
    <style>
      text { fill: #111111; font-family: Inter, "Segoe UI", "Helvetica Neue", Arial, sans-serif; letter-spacing: 0; }
      .mono { font-family: SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 12px; font-weight: 800; fill: #6d28d9; }
      .title { font-size: 32px; font-weight: 800; }
      .subtitle { font-size: 14px; font-weight: 600; fill: #495057; }
      .legend { font-size: 11.5px; font-weight: 700; fill: #495057; }
      .column { font-size: 10.5px; font-weight: 800; fill: #6b7280; }
      .section { font-size: 15px; font-weight: 800; }
      .section-detail { font-size: 11px; font-weight: 700; fill: #495057; }
      .model { font-size: 14px; font-weight: 800; }
      .detail { font-size: 10.5px; font-weight: 650; fill: #6b7280; }
      .doppler-value { font-size: 11.5px; font-weight: 800; fill: #6d28d9; }
      .tjs-value { font-size: 11.5px; font-weight: 800; fill: #9a6700; }
      .ratio { font-size: 21px; font-weight: 800; fill: #6d28d9; }
      .footer { font-size: 10.5px; font-weight: 650; fill: #495057; }
      .section-band { fill: #f4f4f5; }
      .row-line { stroke: #e5e7eb; stroke-width: 1; }
      .column-line { stroke: #e5e7eb; stroke-width: 1; }
      .axis { stroke: #e5e7eb; stroke-width: 2; }
      .doppler-mark { stroke: #6d28d9; stroke-width: 2; }
      .tjs-mark { stroke: #ffb000; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1280" height="930" fill="#ffffff" />

  <text x="42" y="50" class="eyebrow">DOPPLER / TRANSFORMERS.JS</text>
  <text x="42" y="84" class="title">Metal + Vulkan latency</text>
  <text x="42" y="112" class="subtitle">Browser WebGPU · Apple M3 Metal · Radeon 8060S Vulkan</text>

  <circle cx="49" cy="144" r="6" fill="#6d28d9" />
  <text x="65" y="149" class="legend">Doppler</text>
  <circle cx="149" cy="144" r="6" fill="#ffb000" />
  <text x="165" y="149" class="legend">Transformers.js</text>
  <text x="1238" y="149" text-anchor="end" class="legend">POINT = MEAN · WHISKER = ±1 SD · LOWER IS BETTER · EACH ROW HAS ITS OWN SCALE</text>
  <line x1="42" y1="164" x2="1238" y2="164" stroke="#111111" />

  <text x="42" y="190" class="column">WORKLOAD</text>
  <text x="390" y="190" class="column">MEAN ± SD</text>
  <text x="650" y="190" class="column">DISTRIBUTION</text>
  <text x="1109" y="190" text-anchor="middle" class="column">SPEEDUP</text>

  <rect x="42" y="202" width="1196" height="32" class="section-band" />
  <text x="54" y="224" class="section">Apple M3 / Metal</text>
  <text x="1226" y="223" text-anchor="end" class="section-detail">4 MODELS</text>

  <text x="42" y="254" class="model">Qwen 3.5 0.8B text</text>
  <text x="42" y="277" class="detail">n=3 · p512 / d128 · exact output</text>
  <text x="390" y="255" class="doppler-value mono">26.03 ± 0.23 ms/token</text>
  <text x="390" y="281" class="tjs-value mono">36.98 ± 1.98 ms/token</text>
