  <text x="42" y="769" class="detail">n=15 · p512 / d128 · exact output · local model</text>
  <text x="390" y="747" class="doppler-value mono">17.94 ± 0.11 ms/token</text>
  <text x="390" y="773" class="tjs-value mono">24.50 ± 2.10 ms/token</text>
  <path d="M650 743H950" class="axis" />
  <path d="M679 743H685M679 738v10M685 738v10" class="doppler-mark" />
  <circle cx="682" cy="743" r="5" fill="#6d28d9" />
  <path d="M650 769H950" class="axis" />
  <path d="M805 769H921M805 764v10M921 764v10" class="tjs-mark" />
  <circle cx="863" cy="769" r="5" fill="#ffb000" />
  <line x1="990" y1="734" x2="990" y2="778" class="column-line" />
  <text x="1109" y="765" text-anchor="middle" class="ratio">1.37x</text>
  <line x1="42" y1="790" x2="1238" y2="790" class="row-line" />

  <text x="42" y="810" class="model">Gemma 4 E2B INT4-PLE</text>
  <text x="42" y="833" class="detail">n=15 · p064 / d064 · matched output · local model</text>
  <text x="390" y="811" class="doppler-value mono">61.49 ± 0.75 ms/token</text>
