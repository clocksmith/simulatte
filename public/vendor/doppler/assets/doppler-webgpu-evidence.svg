  <line x1="42" y1="858" x2="1238" y2="858" stroke="#111111" />
  <text x="42" y="882" class="footer">Points are means; whiskers are ±1 sample SD. Each row uses its own latency scale.</text>
  <text x="42" y="904" class="footer">Metal Qwen 3.5 2B paired difference: -1.21 ms/token · 95% CI -1.70 to -0.71.</text>
