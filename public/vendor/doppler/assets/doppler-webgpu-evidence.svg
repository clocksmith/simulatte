  <text x="390" y="619" class="doppler-value mono">29.51 ± 0.80 ms/embedding</text>
  <text x="390" y="645" class="tjs-value mono">149.44 ± 11.00 ms/embedding</text>
  <path d="M650 615H950" class="axis" />
  <path d="M679 615H682M679 610v10M682 610v10" class="doppler-mark" />
