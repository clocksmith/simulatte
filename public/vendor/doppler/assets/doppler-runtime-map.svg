<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
  <defs>
    <linearGradient id="map-bg" x1="40" y1="30" x2="1060" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.42" stop-color="#eef8f4"/>
      <stop offset="0.74" stop-color="#edf3ff"/>
      <stop offset="1" stop-color="#fff5ec"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6b7a"/>
      <stop offset="0.32" stop-color="#f5b942"/>
      <stop offset="0.63" stop-color="#00a88f"/>
      <stop offset="1" stop-color="#4f7cff"/>
    </linearGradient>
    <filter id="card-shadow" x="-10%" y="-20%" width="120%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#111318" flood-opacity="0.11"/>
    </filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111318; }
      .label { font-size: 24px; font-weight: 900; }
      .body { font-size: 15px; font-weight: 700; fill: #4a515d; }
      .chip { font-size: 13px; font-weight: 850; letter-spacing: 1px; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "Liberation Mono", Menlo, monospace; font-size: 14px; font-weight: 800; fill: #303640; }
    </style>
  </defs>

  <rect width="1100" height="420" rx="34" fill="#ffffff"/>
  <rect x="18" y="18" width="1064" height="384" rx="28" fill="url(#map-bg)"/>
  <rect x="18" y="18" width="1064" height="384" rx="28" fill="none" stroke="#111318" stroke-width="2"/>

  <path d="M132 212h835" stroke="url(#arrow)" stroke-width="10" stroke-linecap="round"/>
  <path d="M965 212l-27-19v38z" fill="#4f7cff"/>

  <g transform="translate(58 92)" filter="url(#card-shadow)">
    <rect width="178" height="176" rx="24" fill="#ffffff" stroke="#111318" stroke-width="2"/>
    <rect x="22" y="22" width="134" height="34" rx="17" fill="#111318"/>
    <text x="89" y="45" text-anchor="middle" class="chip" fill="#ffffff" style="fill:#ffffff">JSON PLANE</text>
    <text x="28" y="89" class="label">Manifest</text>
    <text x="28" y="120" class="body">model config</text>
    <text x="28" y="144" class="body">tokenizer identity</text>
  </g>

  <g transform="translate(272 92)" filter="url(#card-shadow)">
    <rect width="178" height="176" rx="24" fill="#ffffff" stroke="#111318" stroke-width="2"/>
    <rect x="22" y="22" width="134" height="34" rx="17" fill="#ffffff" stroke="#111318" stroke-width="2"/>
    <text x="89" y="45" text-anchor="middle" class="chip">LOADER</text>
    <text x="28" y="89" class="label">Shards</text>
    <text x="28" y="120" class="body">OPFS / disk cache</text>
    <text x="28" y="144" class="body">hash checks</text>
  </g>

  <g transform="translate(486 92)" filter="url(#card-shadow)">
    <rect width="178" height="176" rx="24" fill="#ffffff" stroke="#111318" stroke-width="2"/>
    <rect x="22" y="22" width="134" height="34" rx="17" fill="#111318"/>
    <text x="89" y="45" text-anchor="middle" class="chip" fill="#ffffff" style="fill:#ffffff">JS PLANE</text>
    <text x="28" y="89" class="label">Runtime</text>
    <text x="28" y="120" class="body">prefill / decode</text>
    <text x="28" y="144" class="body">KV cache policy</text>
  </g>

  <g transform="translate(700 92)" filter="url(#card-shadow)">
    <rect width="178" height="176" rx="24" fill="#ffffff" stroke="#111318" stroke-width="2"/>
    <rect x="22" y="22" width="134" height="34" rx="17" fill="#ffffff" stroke="#111318" stroke-width="2"/>
    <text x="89" y="45" text-anchor="middle" class="chip">WGSL PLANE</text>
    <text x="28" y="89" class="label">Kernels</text>
    <text x="28" y="120" class="body">matmul / attention</text>
    <text x="28" y="144" class="body">dtype lanes</text>
  </g>

  <g transform="translate(914 92)" filter="url(#card-shadow)">
    <rect width="128" height="176" rx="24" fill="#111318"/>
    <text x="64" y="48" text-anchor="middle" class="chip" fill="#ffffff" style="fill:#ffffff">OUTPUT</text>
    <path d="M36 84h56M36 110h42M36 136h60" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="88" cy="110" r="12" fill="#f5b942" stroke="#ffffff" stroke-width="2"/>
  </g>

  <g transform="translate(156 314)">
    <rect x="0" y="0" width="788" height="54" rx="27" fill="#ffffff" stroke="#111318" stroke-width="2"/>
    <text x="32" y="35" class="mono">kernel paths, dtype policy, benchmark contracts, and release evidence stay explicit</text>
    <circle cx="740" cy="27" r="13" fill="#00a88f" stroke="#111318" stroke-width="2"/>
  </g>
</svg>
