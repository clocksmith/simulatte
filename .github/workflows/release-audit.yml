name: Release Audit & Quality Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contracts-and-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Verify plugin boundaries and generated registry
        run: npm run plugins:check

      - name: Verify tier application manifest and references
        run: npm run simulatte:tiers:check

      - name: Run unit and contract test suite
        run: npm test

      - name: Run deploy surface checks
        run: npm run check:deploy

  browser-matrix:
    runs-on: ubuntu-latest
    needs: contracts-and-data
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run City autonomy browser audit
        run: npm run audit:simulatte:browser -- --check --chrome /usr/bin/google-chrome-stable

      - name: Run non-city 4-tier browser smoke audit
        run: node tools/simulatte/run-tier-browser-smoke.mjs --check --chrome /usr/bin/google-chrome-stable

      - name: Upload browser audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-reports
          path: artifacts/
